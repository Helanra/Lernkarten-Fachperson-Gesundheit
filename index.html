@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

<body>
<!-- PASSWORD GATE -->
<div id="gate" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0d1117;">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:18px;padding:40px 36px;max-width:360px;width:90%;text-align:center;">
    <div style="font-size:32px;margin-bottom:12px;">👁</div>
    <h2 style="font-family:'DM Serif Display',serif;color:#f0f6fc;font-size:20px;margin-bottom:6px;">Beobachtungskarten FaGe</h2>
    <p style="color:#8b949e;font-size:13px;margin-bottom:28px;">Bitte Passwort eingeben</p>
    <input id="pw-input" type="password" placeholder="Passwort"
      style="width:100%;padding:11px 14px;border-radius:9px;border:1px solid #30363d;
        background:#21262d;color:#e6edf3;font-size:14px;margin-bottom:10px;
        font-family:'DM Sans',sans-serif;"
      onkeydown="if(event.key==='Enter')checkPw()"/>
    <button onclick="checkPw()"
      style="width:100%;padding:11px;border-radius:9px;border:none;
        background:#388bfd;color:#fff;font-size:14px;font-weight:600;
        font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:12px;">
      Einloggen →
    </button>
    <p id="pw-error" style="color:#f85149;font-size:12px;min-height:16px;"></p>
  </div>
</div>

<div id="root" style="display:none;"></div>

<script>
const PASSWORT = "FaGe2025";
function checkPw(){
  const val = document.getElementById('pw-input').value;
  if(val === PASSWORT){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('root').style.display = 'block';
  } else {
    const err = document.getElementById('pw-error');
    err.textContent = 'Falsches Passwort — bitte nochmal versuchen.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(()=>err.textContent='', 3000);
  }
}
</script>
<script>window.BEOB=[{"area":"A","code":"A.1","title":"Als Berufsperson im Team handeln","leitsatz":"Ich bin Teil eines Teams — meine Verlässlichkeit und meine Kommunikation entscheiden mit, ob unsere Bewohner*innen sicher versorgt sind.","fragen":[{"fokus":"wahrnehmen","frage":"Du übernimmst eine Bewohner*in von der Nachtschicht. Welche Zeichen am Menschen — nicht in der Dokumentation — zeigen dir sofort, wie die Nacht war?"},{"fokus":"handeln","frage":"Du bemerkst beim Rapport, dass eine wichtige Beobachtung fehlt. Wie veränderst du deine erste Begegnung mit diesem Bewohner*innen heute Morgen?"},{"fokus":"mensch","frage":"Ein Bewohner*in wirkt heute anders als gestern — stiller, abweisender. Was könnte das über seinen Zustand sagen, das in keiner Dokumentation steht?"},{"fokus":"melden","frage":"Ab wann ist eine Veränderung beim Bewohner*innen so bedeutsam, dass du sie noch im laufenden Dienst weitergibst — und nicht erst beim Rapport?"}]},{"area":"A","code":"A.2","title":"Beziehungen professionell gestalten","leitsatz":"Ich bin empathisch und klar in meiner Rolle. Nähe ja — aber mit Grenzen.","fragen":[{"fokus":"wahrnehmen","frage":"Wie zeigt dir ein Bewohner*in — ohne Worte — ob er dir vertraut? Welche körperlichen Signale nimmst du bei der Körperpflege wahr?"},{"fokus":"handeln","frage":"Du spürst, dass ein Bewohner*in heute Distanz möchte. Wie passt du deine Pflege — Tempo, Berührung, Sprache — in diesem Moment an?"},{"fokus":"mensch","frage":"Angehörige sind anwesend und der Bewohner*in verhält sich anders als sonst. Was beobachtest du — und was sagt das über seine Situation?"},{"fokus":"melden","frage":"Wann ist eine Veränderung in der Beziehungsgestaltung einer Bewohner*in ein pflegerisches Signal, das du dokumentierst und weitergibst?"}]},{"area":"A","code":"A.3","title":"Gemäss eigenen Beobachtungen handeln","leitsatz":"Ich schaue genau hin — und handle, was ich sehe. Eine Veränderung, die ich nicht weitergebe, ist so, als hätte ich sie nie bemerkt.","fragen":[{"fokus":"wahrnehmen","frage":"Beschreibe, was du mit jedem einzelnen Sinn wahrnehmen kannst, wenn du eine Bewohner*in morgens ins Zimmer trittst — bevor du ihn berührst."},{"fokus":"handeln","frage":"Du bemerkst etwas Unerwartetes — z. B. ein Hämatom, einen veränderten Geruch, eine ungewohnte Körperhaltung. Was tust du in den nächsten 60 Sekunden?"},{"fokus":"mensch","frage":"Dein Bewohner*in sieht 'äusserlich gleich' aus wie gestern. Trotzdem stimmt etwas nicht. Was könnte dieses Gefühl auslösen — und wie gehst du damit um?"},{"fokus":"melden","frage":"Wie unterscheidest du, welche Beobachtung sofort gemeldet wird und welche in die Routinedokumentation gehört?"}]},{"area":"A","code":"A.4","title":"Kultur, Religion und Alter berücksichtigen","leitsatz":"Jede Person hat eine Geschichte, eine Kultur, eine Religion. Ich passe mein Handeln daran an — nicht umgekehrt.","fragen":[{"fokus":"wahrnehmen","frage":"Welche nonverbalen Zeichen zeigen dir, dass eine Pflegemassnahme kulturell oder religiös unangenehm ist — auch wenn der Bewohner*in nichts sagt?"},{"fokus":"handeln","frage":"Du bemerkst, dass dein Bewohner*in beim Waschen verspannt wirkt und den Augenkontakt meidet. Was veränderst du an deiner Vorgehensweise?"},{"fokus":"mensch","frage":"Ein Bewohner*in weint still während der Körperpflege. Du weisst, dass er vor kurzem aus der Heimat geflohen ist. Was könnte dieser Moment für ihn bedeuten?"},{"fokus":"melden","frage":"Wann ist eine kulturell oder religiös bedingte Reaktion einer Bewohner*in so relevant, dass sie dokumentiert und dem Team mitgeteilt werden muss?"}]},{"area":"A","code":"A.5","title":"Bei der Qualitätssicherung mitarbeiten","leitsatz":"Fehler passieren. Wer sie benennt und meldet, schützt die nächste Person.","fragen":[{"fokus":"wahrnehmen","frage":"Du pflegst einen Bewohner*innen und bemerkst, dass eine Massnahme heute anders durchgeführt wurde als gestern. Was nimmst du konkret wahr — an der Bewohner*in?"},{"fokus":"handeln","frage":"Du erkennst ein Risiko — z. B. eine Druckstelle, ein vergessenes Medikament, eine falsche Lagerung. Was tust du, bevor du das Zimmer verlässt?"},{"fokus":"mensch","frage":"Ein Bewohner*in zeigt Zeichen, die auf einen unbehandelten Schmerz hinweisen — obwohl in der Dokumentation 'schmerzfrei' dokumentiert ist. Was tust du mit dieser Diskrepanz?"},{"fokus":"melden","frage":"Wie entscheidest du, ob eine Beobachtung eine CIRS-Meldung braucht oder eine normale Dokumentation reicht?"}]},{"area":"B","code":"B.1","title":"Bei der Körperpflege unterstützen","leitsatz":"Körperpflege ist mein tägliches Fenster zur Person: Ich sehe die Haut, rieche Veränderungen, spüre Anspannung.","fragen":[{"fokus":"wahrnehmen","frage":"Was kannst du während der Körperpflege alles wahrnehmen — mit Augen, Nase, Händen, Ohren? Mach eine mentale Liste, bevor du anfängst."},{"fokus":"handeln","frage":"Du tastest beim Waschen des Rückens eine neue Rötung. Wie verändert diese Beobachtung den Rest deiner Morgenpflege bei diesem Bewohner*innen?"},{"fokus":"mensch","frage":"Dein Bewohner*in lässt sich heute wortlos waschen — sonst spricht er immer. Was könnte das bedeuten — körperlich, psychisch, sozial?"},{"fokus":"melden","frage":"Welche Hautbefunde meldest du sofort, welche dokumentierst du und beobachtest, welche sind normal?"}]},{"area":"B","code":"B.2","title":"Bei der Mobilität unterstützen","leitsatz":"Bewegung erhält Leben. Ich mobilisiere so viel wie möglich und fördere, was die Person noch selbst kann.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an der Bewohner*in, während er sich vom Bett in den Rollstuhl bewegt — Gesichtsfarbe, Atemrhythmus, Muskelspannung, Gleichgewicht?"},{"fokus":"handeln","frage":"Du merkst beim Transfer, dass dein Bewohner*in heute deutlich weniger Kraft hat als gestern. Was veränderst du sofort an deiner Unterstützung?"},{"fokus":"mensch","frage":"Ein Bewohner*in, der gestern noch motiviert war, will heute nicht aufstehen. Was könnte dahinterstecken — und wie findest du es heraus?"},{"fokus":"melden","frage":"Wann ist eine Veränderung der Mobilität einer Bewohner*in ein Zeichen, das über die Pflege hinausgeht und medizinische Abklärung braucht?"}]},{"area":"B","code":"B.3","title":"Bei der Ausscheidung unterstützen","leitsatz":"Ich beobachte Farbe, Menge und Konsistenz — das sagt mir viel. Und ich schütze dabei immer die Würde der Person.","fragen":[{"fokus":"wahrnehmen","frage":"Was kannst du bei der Ausscheidung wahrnehmen — Farbe, Geruch, Konsistenz, Menge, Häufigkeit? Was davon ist heute anders als erwartet?"},{"fokus":"handeln","frage":"Der Urin deines Bewohner*innen ist dunkelbraun und riecht stark. Wie verändert das deine restliche Pflege und deinen Informationsauftrag am heutigen Tag?"},{"fokus":"mensch","frage":"Dein Bewohner*in trinkt wenig, weil er Angst vor Inkontinenz hat. Was beobachtest du an ihm — körperlich und emotional — und was sagt das dir?"},{"fokus":"melden","frage":"Welche Ausscheidungsveränderungen meldest du sofort, welche dokumentierst du für den Rapport — und welche brauchst du nur im Trinkprotokoll?"}]},{"area":"B","code":"B.4","title":"Bei der Atmung unterstützen","leitsatz":"Veränderte Atmung ist ein Warnsignal. Ich erkenne es, handle und begleite ängstliche Menschen mit Ruhe.","fragen":[{"fokus":"wahrnehmen","frage":"Beschreibe, was du siehst, hörst und spürst, wenn du das Zimmer einer Bewohner*in mit Atemnot betrittst — bevor du irgendetwas tust."},{"fokus":"handeln","frage":"Du bemerkst, dass dein Bewohner*in beim Waschen immer wieder pausieren muss. Die SpO2 ist 91%. Wie verändert das deine Pflege in diesem Moment?"},{"fokus":"mensch","frage":"Ein Bewohner*in mit Atemnot wirkt panisch. Was nimmst du an ihm wahr — jenseits der Atemfrequenz — und wie beeinflusst das dein Handeln?"},{"fokus":"melden","frage":"Wann ist eine veränderte Atmung ein Sofort-Signal — und wann reicht es, beim nächsten Rapport zu berichten?"}]},{"area":"B","code":"B.5","title":"Bei der Ernährung unterstützen","leitsatz":"Wer nicht isst oder trinkt, sendet ein Signal. Ich erkenne es, sichere die passende Kostform und gebe weiter, was ich beobachte.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an der Bewohner*in während einer Mahlzeit — Schlucken, Mimik, Tempo, was wird gemieden, wie hält er das Besteck?"},{"fokus":"handeln","frage":"Dein Bewohner*in hustet beim Trinken immer wieder. Wie verändert diese Beobachtung das, was du ihm anbietest und wie du es anbietest?"},{"fokus":"mensch","frage":"Ein Bewohner*in isst seit drei Tagen wenig. Er sagt 'ich habe keinen Hunger'. Was könnte das — jenseits des Magens — über seinen Zustand aussagen?"},{"fokus":"melden","frage":"Ab welchem Punkt ist ein verändertes Ess- oder Trinkverhalten nicht mehr nur ein Ernährungsthema, sondern ein medizinisches Signal?"}]},{"area":"B","code":"B.6","title":"Beim Ruhen und Schlafen unterstützen","leitsatz":"Schlechter Schlaf hat konkrete Folgen. Ich finde heraus, was die Person wirklich braucht.","fragen":[{"fokus":"wahrnehmen","frage":"Was siehst du an einer Bewohner*in, der schlecht geschlafen hat — Augen, Haut, Körperhaltung, Reaktionsvermögen, Stimmung?"},{"fokus":"handeln","frage":"Du bemerkst morgens, dass dein Bewohner*in deutlich erschöpfter ist als sonst. Wie passt du die Körperpflege und den Morgen daran an?"},{"fokus":"mensch","frage":"Ein Bewohner*in, der gut geschlafen hat, verändert sich über Tage — er schläft immer schlechter. Was könnte das über seinen Gesamtzustand sagen?"},{"fokus":"melden","frage":"Wann ist eine Schlafstörung bei einer Bewohner*in ein Zeichen, das über pflegerische Massnahmen hinaus abgeklärt werden muss?"}]},{"area":"C","code":"C.1","title":"In Notfallsituationen reagieren","leitsatz":"Ruhe bewahren, einschätzen, handeln, alarmieren.","fragen":[{"fokus":"wahrnehmen","frage":"Du betrittst ein Zimmer und etwas stimmt nicht — noch bevor du weisst was. Was haben deine Sinne in diesem ersten Moment wahrgenommen?"},{"fokus":"handeln","frage":"Dein Bewohner*in ist bewusstlos. Die ersten 30 Sekunden entscheiden. Was tust du — und was beobachtest du dabei am Körper?"},{"fokus":"mensch","frage":"Ein Bewohner*in zeigt subtile Veränderungen — Verwirrtheit, Schwäche, veränderte Hautfarbe — die einzeln harmlos wirken. Wann erkennst du das Muster?"},{"fokus":"melden","frage":"Wie kommunizierst du im Notfall — wer, was, wann, wie — damit die richtigen Personen sofort das Richtige wissen?"}]},{"area":"C","code":"C.2","title":"In der Sterbephase begleiten","leitsatz":"Sterben gehört zum Leben. Ich begleite würdevoll, erkenne Bedürfnisse und bin da.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du am Körper eines sterbenden Menschen wahr — Haut, Atmung, Temperatur, Mimik, Bewusstsein? Was verändert sich von Tag zu Tag?"},{"fokus":"handeln","frage":"Du bemerkst, dass dein sterbender Bewohner*in auf Berührung reagiert — auch wenn er nicht mehr spricht. Wie verändert das deine Pflege?"},{"fokus":"mensch","frage":"Was beobachtest du an den Angehörigen — und was sagt das dir darüber, was sie in diesem Moment brauchen?"},{"fokus":"melden","frage":"Welche körperlichen Veränderungen in der Sterbephase meldest du sofort dem Team — und welche gehören in die stille Begleitung?"}]},{"area":"C","code":"C.3","title":"In Krisensituationen mitwirken","leitsatz":"Psychische Krisen sind kein schwieriges Verhalten, sondern Ausdruck eines Leidens.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du wahr, wenn ein Bewohner*in in eine psychische Krise gerät — Stimme, Körperhaltung, Blick, Bewegung, Atemrhythmus?"},{"fokus":"handeln","frage":"Dein Bewohner*in wird zunehmend agitiert. Wie veränderst du Raum, Abstand, Stimme und Körperhaltung — und warum genau so?"},{"fokus":"mensch","frage":"Hinter der Krise steckt oft ein Bedürfnis. Was könnte dein Bewohner*in in diesem Moment wirklich brauchen — jenseits der sichtbaren Reaktion?"},{"fokus":"melden","frage":"Wann ist eine Verhaltensveränderung bei einer Bewohner*in ein Zeichen, das sofort psychiatrische Fachpersonen braucht — und wann reicht deine Begleitung?"}]},{"area":"C","code":"C.4","title":"Bei chronischen Erkrankungen und palliativ mitwirken","leitsatz":"Das Ziel ist Lebensqualität, nicht Heilung. Ich begleite, lindere und respektiere den Willen der Person.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an einer Bewohner*in mit chronischer Erkrankung, das dir zeigt, ob er heute einen guten oder schlechten Tag hat — jenseits der Messwerte?"},{"fokus":"handeln","frage":"Dein palliativer Bewohner*in zeigt Schmerzzeichen — Mimik, Anspannung, Schonhaltung — auch wenn er sagt 'es geht'. Wie reagierst du?"},{"fokus":"mensch","frage":"Was beobachtest du an deiner Bewohner*in, das dir zeigt, was ihm heute Lebensqualität bedeutet — was ihn aufhellt, was ihn beschwert?"},{"fokus":"melden","frage":"Wann ist ein Befund bei einem palliativen Bewohner*innen ein medizinisches Signal — und wann ist es ein Teil des Sterbeprozesses, den du begleitest?"}]},{"area":"C","code":"C.5","title":"Bewohner*innen mit Verwirrtheitszuständen unterstützen","leitsatz":"Verwirrtheit verunsichert — mich und die Person. Ich bleibe ruhig, orientiere und schütze.","fragen":[{"fokus":"wahrnehmen","frage":"Wie unterscheidest du anhand deiner Beobachtung, ob die Verwirrtheit deines Bewohner*innen heute 'seine übliche Demenz' ist — oder etwas Neues, Akutes?"},{"fokus":"handeln","frage":"Dein Bewohner*in erkennt dich heute nicht. Wie veränderst du deine Annäherung, deine Stimme, deine Berührung — konkret?"},{"fokus":"mensch","frage":"Hinter der Unruhe eines verwirrten Bewohner*innen steckt oft ein Bedürfnis — Hunger, Schmerz, Angst, Toileттenwunsch. Wie liest du das am Körper ab?"},{"fokus":"melden","frage":"Welche Veränderungen bei einem dementen Bewohner*innen brauchen sofortige medizinische Abklärung — und welche gehören in die tägliche Beobachtungsdokumentation?"}]},{"area":"D","code":"D.1","title":"Vitalzeichen und Flüssigkeitsbilanz","leitsatz":"Ich messe nicht, um Zahlen einzutragen. Ich messe, um zu verstehen — und beobachte den Menschen, nicht nur das Messgerät.","fragen":[{"fokus":"wahrnehmen","frage":"Du misst den Blutdruck einer Bewohner*in. Welche Werte würden dich aufhorchen lassen — nach oben oder unten? Und was beobachtest du gleichzeitig am Menschen, jenseits der Zahl auf dem Gerät?"},{"fokus":"handeln","frage":"Dein Bewohner*in hat Fieber — 38.8°C. Wie verändert dieser Befund deine gesamte Pflege in den nächsten Stunden — Flüssigkeit, Lagerung, Umgebung, Beobachtung?"},{"fokus":"mensch","frage":"Die Vitalzeichen sind normal, aber der Bewohner*in sieht nicht gut aus. Was könnte das bedeuten — und wie gewichtest du deine Beobachtung gegenüber den Messwerten?"},{"fokus":"melden","frage":"Wann ist ein Vitalzeichenbefund ein Sofort-Signal an die Pflegefachperson — und wann gehört er in die nächste reguläre Rapportrunde?"},{"fokus":"wahrnehmen","frage":"Woran erkennst du an einer Bewohner*in — ohne Messung — ob sie zu wenig trinkt? Was nimmst du an Haut, Schleimhäuten, Bewusstsein und Urin wahr?"},{"fokus":"handeln","frage":"Die Flüssigkeitsbilanz deiner Bewohner*in ist heute negativ — sie hat deutlich weniger getrunken als ausgeschieden. Wie verändert das deine Pflege und deinen Informationsauftrag am heutigen Tag?"},{"fokus":"mensch","frage":"Eine Bewohner*in trinkt seit Tagen zu wenig. Was könnte hinter diesem Verhalten stecken — körperlich, psychisch, praktisch?"},{"fokus":"melden","frage":"Ab welchem Punkt ist eine negative Flüssigkeitsbilanz ein medizinisches Signal — und welche Werte oder Zeichen würden dich sofort zur Pflegefachperson schicken?"}]},{"area":"D","code":"D.2","title":"Venöse und kapilläre Blutentnahmen","leitsatz":"Ich sehe mehr als ein Röhrchen Blut — ich sehe einen Menschen mit Angst, schlechten Venen und einer Geschichte.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du an der Bewohner*in wahr, bevor du die Nadel ansetzt — Hautfarbe, Venenverlauf, Muskelspannung, Atmung, Mimik?"},{"fokus":"handeln","frage":"Dein Bewohner*in wird sehr blass und schwitzt während der Entnahme. Was tust du — und was beobachtest du weiter?"},{"fokus":"mensch","frage":"Eine kapilläre Blutentnahme beim Finger — eine alltägliche Handlung für dich. Was könnte sie für den Bewohner*innen bedeuten, emotional und körperlich?"},{"fokus":"melden","frage":"Welche Beobachtungen nach einer Blutentnahme — an der Einstichstelle, am Allgemeinzustand — brauchen eine Meldung?"}]},{"area":"D","code":"D.3","title":"Medikamente richten und verabreichen","leitsatz":"Ich verabreiche das Medikament — und beobachte danach, was es mit dem Menschen macht.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an der Bewohner*in, nachdem du ein Medikament verabreicht hast — in den ersten Minuten, in der ersten Stunde?"},{"fokus":"handeln","frage":"Dein Bewohner*in zeigt nach der Medikamentengabe Zeichen einer allergischen Reaktion — Rötung, Juckreiz, Unruhe. Was tust du in den nächsten 30 Sekunden?"},{"fokus":"mensch","frage":"Dein Bewohner*in schluckt das Medikament — aber du weisst, er möchte es eigentlich nicht. Was nimmst du an ihm wahr — und wie gehst du damit um?"},{"fokus":"melden","frage":"Wann ist eine Reaktion auf ein Medikament ein Sofort-Signal — und wann ist es eine Beobachtung für den Verlauf?"}]},{"area":"D","code":"D.4","title":"Infusionen richten und verabreichen","leitsatz":"Jede Infusion kann zur Fehlerquelle werden. Ich überprüfe, berechne, beobachte — und melde, was ich bemerke.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an der Infusionsstelle und an der Bewohner*in, während eine Infusion läuft — regelmässig, bewusst, nicht nur beim Wechsel?"},{"fokus":"handeln","frage":"Du siehst Rötung und Schwellung an der Einstichstelle. Was tust du sofort — und was beobachtest du dabei weiter an der Bewohner*in?"},{"fokus":"mensch","frage":"Dein Bewohner*in liegt seit Tagen mit einer Infusion. Was nimmst du an ihm wahr, das über die technische Kontrolle hinausgeht — Komfort, Mobilität, Stimmung?"},{"fokus":"melden","frage":"Welche Befunde an der Infusionsstelle oder an der Bewohner*in erfordern sofortige Meldung — und welche dokumentierst du im Verlauf?"}]},{"area":"D","code":"D.5","title":"Sondennahrung bereitstellen und verabreichen","leitsatz":"Sondenkost ist kein Autopilot. Ich kontrolliere Lage, Rate und Verträglichkeit — und beobachte, wie die Person darauf reagiert.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an der Bewohner*in während der Sondenernährung — Bauch, Atmung, Mimik, Lage der Sonde, Geräusche?"},{"fokus":"handeln","frage":"Dein Bewohner*in hustet und würgt während der Sondenernährung. Was tust du jetzt — in welcher Reihenfolge?"},{"fokus":"mensch","frage":"Dein Bewohner*in kann nicht sprechen und erhält alle Nahrung über die Sonde. Was nimmst du wahr, das dir zeigt, wie es ihm dabei geht?"},{"fokus":"melden","frage":"Welche Beobachtungen bei der Sondenernährung brauchen sofortige Meldung — welche gehören in die Verlaufsdokumentation?"}]},{"area":"D","code":"D.6","title":"Subkutane und intramuskuläre Injektionen","leitsatz":"Die richtige Technik, der richtige Ort — und danach beobachten, was der Körper antwortet.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du an der Injektionsstelle und an der Bewohner*in wahr — vor, während und nach der Injektion?"},{"fokus":"handeln","frage":"Du injizierst Insulin und dein Bewohner*in beginnt kurz darauf zu schwitzen und zu zittern. Was tust du — Schritt für Schritt?"},{"fokus":"mensch","frage":"Dein Bewohner*in hat Angst vor Injektionen. Was beobachtest du an ihm — und wie veränderst du deine Vorgehensweise aufgrund dieser Wahrnehmung?"},{"fokus":"melden","frage":"Wann ist eine Reaktion nach einer Injektion ein normaler Befund — und wann ein Signal, das sofort weitergeleitet werden muss?"}]},{"area":"D","code":"D.7","title":"Verbandwechsel und Wundbeurteilung","leitsatz":"Eine Wunde zeigt mir, wie es der Person innen geht. Ich beurteile systematisch, handle aseptisch und erkenne, wenn sich etwas verschlechtert.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du beim Verbandwechsel wahr — mit Augen, Nase, Händen? Beschreibe, was du an einer Wunde alles beobachten kannst."},{"fokus":"handeln","frage":"Du öffnest den Verband und siehst eine neue Rötung am Wundrand und riechst einen veränderten Geruch. Was tust du — bevor du den neuen Verband schliesst?"},{"fokus":"mensch","frage":"Dein Bewohner*in reagiert beim Verbandwechsel mit Anspannung, Grimassieren oder Zurückziehen. Was sagt das dir — und wie veränderst du dein Vorgehen?"},{"fokus":"melden","frage":"Welche Wundbefunde sind sofortige Meldungen — welche sind Verlaufsbeobachtungen — und welche zeigen Fortschritt?"}]},{"area":"E","code":"E.1","title":"Hygienemassnahmen und Arbeitssicherheit","leitsatz":"Händedesinfektion rettet Leben — das ist keine Übertreibung.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du an einer Bewohner*in wahr, der an einem übertragbaren Erreger erkrankt ist — am Körper, in der Umgebung, an den Ausscheidungen?"},{"fokus":"handeln","frage":"Du bemerkst, dass dein Bewohner*in mit MRSA heute feucht schwitzt und über Schüttelfrost klagt. Wie verändert das deine Isolation und deine Pflege?"},{"fokus":"mensch","frage":"Isolation ist für viele Bewohner*innen belastend. Was beobachtest du an einer Bewohner*in im Einzelzimmer — jenseits der Infektiologie?"},{"fokus":"melden","frage":"Welche Beobachtungen bei einem isolierten Bewohner*innen brauchen sofortige Weiterleitung — und was gehört in die tägliche Verlaufsdokumentation?"}]},{"area":"E","code":"E.2","title":"Massnahmen zur Prävention durchführen","leitsatz":"Die beste Infektion ist jene, die nie eintritt. Ich erkenne Risiken, führe Schutzmassnahmen durch.","fragen":[{"fokus":"wahrnehmen","frage":"Welche frühen Zeichen einer beginnenden Infektion kannst du an der Bewohner*in wahrnehmen — bevor Fieber messbar ist?"},{"fokus":"handeln","frage":"Du bemerkst auf deiner Abteilung, dass drei Bewohner*innen gleichzeitig Diarrhö haben. Was tust du jetzt — sofort?"},{"fokus":"mensch","frage":"Dein Bewohner*in hat Fieber. Was beobachtest du an ihm — Haut, Bewusstsein, Flüssigkeitszeichen, Stimmung — und was verändert das an deiner Pflege?"},{"fokus":"melden","frage":"Wann ist ein Infektionszeichen bei einem einzelnen Bewohner*innen ein abteilungsrelevantes Signal — wann reicht individuelle Massnahme?"}]},{"area":"E","code":"E.3","title":"Ressourcen von Bewohner*innen fördern","leitsatz":"Ich sehe, was jemand noch kann — und schaffe den Raum, es zu tun.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an der Bewohner*in, das dir zeigt, was er noch selbst kann — auch wenn es klein ist? Welche Ressourcen siehst du, die vielleicht niemand dokumentiert hat?"},{"fokus":"handeln","frage":"Du bemerkst, dass dein Bewohner*in heute seinen Arm selbst bewegt — das war gestern noch nicht möglich. Wie veränderst du sofort deine Unterstützung?"},{"fokus":"mensch","frage":"Dein Bewohner*in sagt 'ich kann das nicht mehr'. Du siehst aber, dass er es gerade getan hat. Was liegt hinter dieser Aussage — und wie gehst du damit um?"},{"fokus":"melden","frage":"Wann ist ein neues Ressourcenzeichen beim Bewohner*innen so bedeutsam, dass es sofort dokumentiert und dem Team mitgeteilt wird?"}]},{"area":"E","code":"E.4","title":"Bei Ernährungsfragen informieren und begleiten","leitsatz":"Ich erkenne den Ernährungszustand, berate im Rahmen meiner Kompetenz und hole Fachleute dazu, wenn nötig.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du an einer Bewohner*in wahr, der an Mangelernährung leidet — Haut, Muskeln, Haare, Stimmung, Wundheilung?"},{"fokus":"handeln","frage":"Dein Bewohner*in hat in den letzten Wochen sichtbar abgenommen. Wie verändert diese Beobachtung deinen Pflegealltag mit ihm — heute, konkret?"},{"fokus":"mensch","frage":"Dein Bewohner*in isst wenig. Du weisst, er hat gerade jemanden verloren. Was beobachtest du — und was sagt das über den Zusammenhang zwischen Essen und Befinden?"},{"fokus":"melden","frage":"Ab welchem Punkt ist ein verändertes Essverhalten ein medizinisches Signal, das über die Pflege hinaus abgeklärt werden muss?"}]},{"area":"F","code":"F.1","title":"Den Alltag professionell gestalten","leitsatz":"Alltagsgestaltung ist Pflege. Ich kenne die Person, ihre Ressourcen und Vorlieben — und gestalte mit ihr, nicht für sie.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an einer Bewohner*in, der am Alltag teilnimmt — Mimik, Körpersprache, Interaktion, Energie — versus einem, der sich zurückzieht?"},{"fokus":"handeln","frage":"Du bemerkst, dass dein Bewohner*in heute bei einer Aktivität auflebt, die er sonst ablehnt. Was tust du mit dieser Beobachtung?"},{"fokus":"mensch","frage":"Dein Bewohner*in verweigert seit Wochen alle Angebote. Was beobachtest du an ihm, das dir Hinweise gibt, was er wirklich braucht?"},{"fokus":"melden","frage":"Wann ist sozialer Rückzug einer Bewohner*in ein pflegerisches Signal, das dokumentiert und dem Team mitgeteilt werden muss?"}]},{"area":"F","code":"F.2","title":"Tagesstruktur aufbauen und unterstützen","leitsatz":"Struktur gibt Orientierung und Sicherheit. Ich plane gemeinsam, respektiere Bedürfnisse und schaffe Verlässlichkeit.","fragen":[{"fokus":"wahrnehmen","frage":"Woran erkennst du an der Bewohner*in, dass er heute Mühe hat, den Tag zu beginnen — Körpersprache, Mimik, Reaktion, Schlafspuren?"},{"fokus":"handeln","frage":"Dein Bewohner*in schafft heute morgen kaum aufzustehen. Wie passt du die Tagesstruktur an — konkret, für heute?"},{"fokus":"mensch","frage":"Was beobachtest du an einer Bewohner*in ohne Tagesstruktur versus einem mit stabiler Routine — körperlich und psychisch?"},{"fokus":"melden","frage":"Wann ist eine anhaltende Unfähigkeit, eine Tagesstruktur aufrechtzuerhalten, ein Signal, das über die Aktivierungspflege hinausgeht?"}]},{"area":"F","code":"F.3","title":"Individuelle Sexualität wahrnehmen","leitsatz":"Sexualität gehört zur Würde — in jedem Alter. Ich nehme Bedürfnisse wahr und schaffe den nötigen Rahmen.","fragen":[{"fokus":"wahrnehmen","frage":"Welche nonverbalen Zeichen zeigen dir, dass ein Bewohner*in Bedürfnisse nach Nähe, Berührung oder Intimität hat — auch wenn er es nicht ausspricht?"},{"fokus":"handeln","frage":"Du bemerkst, dass ein Bewohner*in bei der Körperpflege eine unerwartete sexuelle Reaktion zeigt. Wie reagierst du — in diesem Moment?"},{"fokus":"mensch","frage":"Was sagt dir ein Bewohner*in, der sich nach dem Tod seines Partners abschliesst und Körperkontakt meidet, über sein inneres Erleben?"},{"fokus":"melden","frage":"Wann ist eine Wahrnehmung im Bereich Sexualität ein Befund, der dokumentiert und im Team besprochen werden muss?"}]},{"area":"G","code":"G.1","title":"Bei Kleider- und Pflegewahl unterstützen","leitsatz":"Kleidung ist Identität. Ich helfe beim An- und Auskleiden und achte auf Würde, Sicherheit und die Person dahinter.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du an der Bewohner*in wahr, während du ihm beim Ankleiden hilfst — Muskelschwäche, Schmerzen, Gleichgewicht, Stimmung, Körperwahrnehmung?"},{"fokus":"handeln","frage":"Dein Bewohner*in zieht heute den Arm beim Ankleiden nicht mit — es wirkt schmerzhaft. Was tust du — und was beobachtest du dabei?"},{"fokus":"mensch","frage":"Dein Bewohner*in, der früher sehr auf sein Äusseres bedacht war, interessiert sich nicht mehr für seine Kleidung. Was könnte das über seinen Zustand aussagen?"},{"fokus":"melden","frage":"Wann ist eine Beobachtung beim An- und Auskleiden ein Zeichen, das über die Alltagspflege hinaus abgeklärt werden muss?"}]},{"area":"G","code":"G.2","title":"Für ein sauberes und sicheres Lebensumfeld sorgen","leitsatz":"Das Zimmer ist das Zuhause der Person — sauber, sicher, persönlich und respektiert.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du wahr, wenn du das Zimmer einer Bewohner*in betrittst — Geruch, Ordnung, Licht, Temperatur, Hilfsmittel, persönliche Gegenstände?"},{"fokus":"handeln","frage":"Du siehst im Zimmer deines Bewohner*innen Stolperfallen, schlechte Beleuchtung und ein Hilfsmittel am falschen Ort. Was tust du — sofort und nachhaltig?"},{"fokus":"mensch","frage":"Das Zimmer einer Bewohner*in verändert sich — es wird unordentlicher, persönliche Gegenstände verschwinden. Was könnte das über seinen Zustand aussagen?"},{"fokus":"melden","frage":"Welche Befunde im Lebensumfeld einer Bewohner*in brauchen sofortige Meldung — und welche löst du direkt?"}]},{"area":"H","code":"H.1","title":"Bei Ein- und Austritten mitarbeiten","leitsatz":"Ein- und Austritt sind heikle Übergänge. Was ich vollständig weitergebe, sichert die Versorgung ab.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an einer Bewohner*in beim Eintritt — in den ersten Minuten, bevor du irgendwelche Daten erfasst hast?"},{"fokus":"handeln","frage":"Dein Bewohner*in wird notfallmässig ins Spital verlegt. Was nimmst du an ihm wahr — und was gibst du dem Rettungsdienst als erstes mit?"},{"fokus":"mensch","frage":"Ein Heimeintritt kann einschneidend sein. Was beobachtest du an der Bewohner*in in den ersten Tagen — emotional, körperlich, sozial?"},{"fokus":"melden","frage":"Welche Beobachtungen beim Eintritt sind so wichtig, dass sie sofort dokumentiert und dem Team mitgeteilt werden?"}]},{"area":"H","code":"H.2","title":"Mit Informations- und Kommunikationstechnologie arbeiten","leitsatz":"Was nicht dokumentiert ist, gilt als nicht gemacht. Ich schreibe vollständig, zeitnah, in Fachsprache.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an der Bewohner*in, das du dokumentieren würdest — und was würdest du weglassen? Wie triffst du diese Entscheidung?"},{"fokus":"handeln","frage":"Du liest in der Dokumentation 'Patient schläft gut' — aber du siehst beim Eintreten, dass der Bewohner*in wach und unruhig aussieht. Wie gehst du vor?"},{"fokus":"mensch","frage":"Was sagt eine Pflegedokumentation aus — und was verschweigt sie oft? Welche Beobachtungen fallen häufig durchs Raster?"},{"fokus":"melden","frage":"Wann ist eine Beobachtung so wichtig, dass sie nicht bis zum Rapport warten kann — sondern sofort kommuniziert werden muss?"}]},{"area":"H","code":"H.3","title":"Transporte organisieren","leitsatz":"Transport ist mehr als Logistik. Ich bereite vor, begleite wenn nötig und informiere klar.","fragen":[{"fokus":"wahrnehmen","frage":"Was beobachtest du an einer Bewohner*in vor einem Transport — Angst, körperliche Belastbarkeit, Schmerzzeichen, Verwirrung?"},{"fokus":"handeln","frage":"Dein Bewohner*in wirkt vor dem Transport sehr ängstlich — Puls erhöht, Hände kalt. Was tust du — vor und während des Transports?"},{"fokus":"mensch","frage":"Ein Transport zum Arzt oder ins Spital kann für den Bewohner*innen viel bedeuten. Was nimmst du an ihm wahr — und was braucht er in diesem Moment?"},{"fokus":"melden","frage":"Welche Befunde während oder nach einem Transport brauchen sofortige Meldung — an wen, in welcher Form?"}]},{"area":"H","code":"H.4","title":"Verbrauchsmaterialien und Medikamente bewirtschaften","leitsatz":"Verfallsdaten, korrekte Lagerung, vollständige Bestände — das ist Patientensicherheit, bevor die Pflege beginnt.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du wahr, wenn du den Medikamentenschrank oder das Lager kontrollierst — was fällt dir auf, was stört, was fehlt?"},{"fokus":"handeln","frage":"Du findest abgelaufene Medikamente im Schrank. Gleichzeitig fragt eine Kollegin, ob sie davon noch etwas verwenden kann. Was sagst du — und was tust du?"},{"fokus":"mensch","frage":"Ein fehlendes Medikament oder abgelaufenes Material trifft am Ende immer den Bewohner*innen. Wie verbindest du Lagerkontrolle mit dem Bild des Menschen, den es betrifft?"},{"fokus":"melden","frage":"Welche Lagerbefunde meldest du sofort — welche löst du selbst — welche dokumentierst du für später?"}]},{"area":"H","code":"H.5","title":"Apparate und Mobiliar unterhalten","leitsatz":"Ein defektes Gerät, das ich nicht melde, ist ein Risiko, das ich mitverantworte.","fragen":[{"fokus":"wahrnehmen","frage":"Was nimmst du wahr, wenn du ein Pflegebett, einen Rollstuhl oder eine Infusionspumpe verwendest — was klingt, fühlt oder verhält sich anders als normal?"},{"fokus":"handeln","frage":"Das Bett deines Bewohner*innen lässt sich nicht tiefstellen — er sitzt zu hoch für einen sicheren Transfer. Was tust du — sofort, für diesen Bewohner*innen, jetzt?"},{"fokus":"mensch","frage":"Defekte Geräte und unordentliche Infrastruktur beeinflussen den Bewohner*innen. Was beobachtest du an einer Bewohner*in in einem gepflegten Zimmer versus einem vernachlässigten?"},{"fokus":"melden","frage":"Welche Gerätebefunde sind Sofort-Ausserbetriebnahme — welche sind 'beobachten und beim nächsten Rapport melden'?"}]}];</script>
<script type="text/babel">
const{useState,useMemo,useEffect}=React;

const FOKUS={
  wahrnehmen:{emoji:"👁",label:"Was nimmst du wahr?",    bg:"#0d2137",accent:"#388bfd",dim:"#1c3a5c"},
  handeln:   {emoji:"⟳", label:"Wie verändert das deine Pflege?",bg:"#0d2a1a",accent:"#3fb950",dim:"#1a3d28"},
  mensch:    {emoji:"◎", label:"Was sagt das über den Menschen?",bg:"#1e1135",accent:"#bc8cff",dim:"#2d1f4a"},
  melden:    {emoji:"△", label:"Wann meldest du?",        bg:"#2a1500",accent:"#f0883e",dim:"#3d2200"},
};
const AREA_COL={
  A:"#388bfd",B:"#3fb950",C:"#f0883e",D:"#f85149",
  E:"#56d364",F:"#bc8cff",G:"#e3b341",H:"#79c0ff",
};
const AREA_NAMES={
  A:"Professionalität",B:"Pflegen & Betreuen",C:"Anspruchsvolle Situationen",
  D:"Medizinaltechnik",E:"Gesundheit & Hygiene",F:"Alltag",
  G:"Hauswirtschaft",H:"Administration",
};

/* ── Single HK Card ── */
function HKCard({hk, filteredFragen, progress, onToggle}){
  const col = AREA_COL[hk.area];
  // revealed = how many questions shown (0 = only leitsatz)
  const [revealed, setReveal] = useState(0);
  const total = filteredFragen.length;
  const allDone = filteredFragen.every((_,i)=>progress[hk.code+"-"+i]);

  // Reset reveal when filter changes
  useEffect(()=>{ setReveal(0); },[filteredFragen.length]);

  const showNext = ()=>{ if(revealed < total) setReveal(r=>r+1); };
  const reset = ()=>{ setReveal(0); };

  return(
    <div style={{background:"#161b22",borderRadius:18,
      border:"1px solid "+(allDone?"#238636":"#30363d"),
      boxShadow:allDone?"0 0 0 1px #238636,0 8px 32px rgba(35,134,54,.15)":
        "0 4px 24px rgba(0,0,0,.4)",
      overflow:"hidden",transition:"box-shadow .3s,border-color .3s"}}>

      {/* ── TOP BAR ── */}
      <div style={{background:"linear-gradient(135deg,"+col+"18,"+col+"08)",
        padding:"18px 20px 14px",borderBottom:"1px solid #30363d"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{background:col,color:"#0d1117",borderRadius:7,padding:"3px 10px",
              fontSize:12,fontWeight:700,letterSpacing:.3}}>{hk.code}</span>
            <span style={{fontSize:11,color:col,fontWeight:500,opacity:.9}}>{AREA_NAMES[hk.area]}</span>
          </div>
          {allDone&&<span style={{fontSize:12,color:"#3fb950",fontWeight:600,flexShrink:0}}>✓ Abgeschlossen</span>}
        </div>
        <h3 style={{margin:"9px 0 7px",fontSize:15,fontWeight:600,
          color:"#f0f6fc",lineHeight:1.35,fontFamily:"'DM Serif Display',serif"}}>{hk.title}</h3>
        <p style={{fontSize:12,color:"#8b949e",lineHeight:1.6,fontStyle:"italic"}}>
          „{hk.leitsatz}"
        </p>
        {/* mini progress dots */}
        {total>0&&<div style={{display:"flex",gap:5,marginTop:12,alignItems:"center"}}>
          {filteredFragen.map((_,i)=>(
            <div key={i} style={{width:6,height:6,borderRadius:99,transition:"background .3s",
              background: progress[hk.code+"-"+i]?"#3fb950":
                i<revealed?"#58a6ff":"#30363d"}}/>
          ))}
          <span style={{fontSize:10,color:"#484f58",marginLeft:4}}>
            {revealed}/{total} gezeigt
          </span>
        </div>}
      </div>

      {/* ── FRAGEN (revealed one by one) ── */}
      <div style={{padding:"14px 18px 0"}}>
        {filteredFragen.slice(0,revealed).map((f,i)=>{
          const fo=FOKUS[f.fokus];
          const doneKey=hk.code+"-"+i;
          const done=!!progress[doneKey];
          return(
            <div key={i} className="slide-up"
              style={{background:fo.bg,borderRadius:12,
                border:"1px solid "+(done?"#238636":fo.accent+"33"),
                padding:"13px 15px",marginBottom:10,
                boxShadow:done?"inset 0 0 0 1px #238636":"none",
                transition:"border-color .3s,box-shadow .3s"}}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontSize:15,flexShrink:0,marginTop:1,color:fo.accent}}>{fo.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:9.5,fontWeight:700,color:fo.accent,
                    textTransform:"uppercase",letterSpacing:.9,marginBottom:5}}>
                    {fo.label}
                  </div>
                  <p style={{fontSize:13,lineHeight:1.65,color:"#c9d1d9"}}>{f.frage}</p>
                </div>
                <button onClick={()=>onToggle(doneKey)}
                  title={done?"Als offen markieren":"Als reflektiert markieren"}
                  style={{flexShrink:0,width:24,height:24,borderRadius:99,
                    border:"1.5px solid "+(done?"#238636":"#484f58"),
                    background:done?"#238636":"transparent",
                    color:done?"#fff":"#484f58",
                    fontSize:12,display:"flex",alignItems:"center",
                    justifyContent:"center",marginTop:1,transition:"all .2s"}}>
                  {done?"✓":"○"}
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {/* ── ACTION BUTTON ── */}
      <div style={{padding:"10px 18px 16px"}}>
        {revealed===0&&(
          <button onClick={showNext} className="slide-up"
            style={{width:"100%",padding:"12px",borderRadius:10,border:"none",
              background:col,color:"#0d1117",fontSize:13,fontWeight:600,
              letterSpacing:.2,transition:"opacity .2s"}}
            onMouseOver={e=>e.target.style.opacity=".85"}
            onMouseOut={e=>e.target.style.opacity="1"}>
            Erste Frage anzeigen →
          </button>
        )}
        {revealed>0&&revealed<total&&(
          <button onClick={showNext} className="slide-up"
            style={{width:"100%",padding:"12px",borderRadius:10,
              border:"1px solid "+col+"66",
              background:col+"15",color:col,
              fontSize:13,fontWeight:600,letterSpacing:.2,transition:"all .2s"}}
            onMouseOver={e=>{e.currentTarget.style.background=col+"30";}}
            onMouseOut={e=>{e.currentTarget.style.background=col+"15";}}>
            Nächste Frage → ({revealed+1}/{total})
          </button>
        )}
        {revealed===total&&total>0&&(
          <div style={{display:"flex",gap:8}}>
            <button onClick={reset}
              style={{flex:1,padding:"10px",borderRadius:10,
                border:"1px solid #30363d",background:"transparent",
                color:"#8b949e",fontSize:12,fontWeight:500,transition:"all .2s"}}
              onMouseOver={e=>e.currentTarget.style.borderColor="#8b949e"}
              onMouseOut={e=>e.currentTarget.style.borderColor="#30363d"}>
              ↺ Von vorne
            </button>
            {!allDone&&<button onClick={()=>filteredFragen.forEach((_,i)=>!progress[hk.code+"-"+i]&&onToggle(hk.code+"-"+i))}
              style={{flex:2,padding:"10px",borderRadius:10,
                border:"1px solid #238636",background:"#23863620",
                color:"#3fb950",fontSize:12,fontWeight:600,transition:"all .2s"}}
              onMouseOver={e=>e.currentTarget.style.background="#23863640"}
              onMouseOut={e=>e.currentTarget.style.background="#23863620"}>
              Alle als reflektiert ✓
            </button>}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const[activeArea,setArea]=useState("Alle");
  const[activeFokus,setFokus]=useState("Alle");
  const[progress,setProgress]=useState({});
  const[search,setSearch]=useState("");

  const areas=["Alle","A","B","C","D","E","F","G","H"];

  const toggle=(key)=>setProgress(p=>({...p,[key]:!p[key]}));

  const filtered=useMemo(()=>window.BEOB.filter(hk=>{
    if(activeArea!=="Alle"&&hk.area!==activeArea)return false;
    if(search&&!hk.code.toLowerCase().includes(search.toLowerCase())&&
       !hk.title.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  }),[activeArea,search]);

  const getFilteredFragen=(hk)=>activeFokus==="Alle"
    ? hk.fragen
    : hk.fragen.filter(f=>f.fokus===activeFokus);

  const totalQ=window.BEOB.reduce((s,h)=>s+h.fragen.length,0);
  const doneQ=Object.values(progress).filter(Boolean).length;
  const pct=Math.round(doneQ/totalQ*100);

  return(
    <div style={{minHeight:"100vh",background:"#0d1117"}}>

      {/* HEADER */}
      <div style={{padding:"28px 24px 20px",borderBottom:"1px solid #21262d",
        background:"linear-gradient(180deg,#161b22,#0d1117)"}}>
        <div style={{maxWidth:1180,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"flex-start",
            justifyContent:"space-between",flexWrap:"wrap",gap:12}} className="header-row">
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:20}}>👁</span>
                <h1 style={{fontSize:20,fontWeight:600,color:"#f0f6fc",
                  fontFamily:"'DM Serif Display',serif",letterSpacing:-.3}}>
                  Beobachtungskarten FaGe EFZ
                </h1>
              </div>
              <p style={{fontSize:12,color:"#484f58",lineHeight:1.6}}>
                37 Handlungskompetenzen · 148 Fragen · Den Menschen wahrnehmen — nicht nur die Aufgabe
              </p>
            </div>
            <div style={{background:"#161b22",border:"1px solid #21262d",
              borderRadius:12,padding:"10px 16px",minWidth:180}}>
              <div style={{display:"flex",justifyContent:"space-between",
                fontSize:11,color:"#8b949e",marginBottom:5}}>
                <span>Reflexionsfortschritt</span>
                <strong style={{color:"#3fb950"}}>{pct}%</strong>
              </div>
              <div style={{background:"#21262d",borderRadius:99,height:5}}>
                <div style={{background:"linear-gradient(90deg,#388bfd,#3fb950)",
                  borderRadius:99,height:5,width:pct+"%",transition:"width .6s ease"}}/>
              </div>
              <div style={{fontSize:10,color:"#484f58",marginTop:4}}>{doneQ}/{totalQ} reflektiert</div>
            </div>
          </div>

          {/* Filters */}
          <div style={{marginTop:18,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="HK suchen…"
              style={{padding:"6px 12px",borderRadius:8,border:"1px solid #30363d",
                background:"#21262d",color:"#e6edf3",fontSize:12,minWidth:140}}/>

            {/* Bereich */}
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              {areas.map(a=>{
                const active=activeArea===a;
                const c=a==="Alle"?null:AREA_COL[a];
                return<button key={a}
                  onClick={()=>setArea(a)}
                  style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:active?600:400,
                    border:"1px solid "+(active?(c||"#58a6ff"):"#30363d"),
                    background:active?(c||"#388bfd")+"22":"transparent",
                    color:active?(c||"#58a6ff"):"#8b949e",transition:"all .15s"}}>
                  {a==="Alle"?"Alle":a}
                </button>;
              })}
            </div>

            {/* Fokus */}
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              {["Alle",...Object.keys(FOKUS)].map(f=>{
                const fo=FOKUS[f];
                const active=activeFokus===f;
                return<button key={f}
                  onClick={()=>setFokus(f)}
                  style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:active?600:400,
                    border:"1px solid "+(active?(fo?.accent||"#58a6ff"):"#30363d"),
                    background:active?(fo?.dim||"#1c2128"):"transparent",
                    color:active?(fo?.accent||"#58a6ff"):"#8b949e",transition:"all .15s"}}>
                  {f==="Alle"?"Alle Fragen":(fo.emoji+" "+{
                    wahrnehmen:"Wahrnehmen",handeln:"Handeln",
                    mensch:"Mensch",melden:"Melden"}[f])}
                </button>;
              })}
            </div>
          </div>
        </div>
      </div>

      {/* CARDS */}
      <div style={{maxWidth:1180,margin:"0 auto",padding:"24px"}}>
        <p style={{fontSize:11,color:"#484f58",marginBottom:16}}>
          {filtered.length} Handlungskompetenzen · Klick auf Karte → Frage für Frage
        </p>
        <div className="grid"
          style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",
            gap:16,alignItems:"start"}}>
          {filtered.map(hk=>(
            <HKCard key={hk.code} hk={hk}
              filteredFragen={getFilteredFragen(hk)}
              progress={progress} onToggle={toggle}/>
          ))}
        </div>
      </div>
      {/* COPYRIGHT */}
      <div style={{textAlign:"center",padding:"20px 24px 36px",borderTop:"1px solid #21262d",marginTop:8}}>
        <p style={{fontSize:11,color:"#484f58",lineHeight:1.7}}>
          © 2025 Stefanie Passauer — Alle Rechte vorbehalten.<br/>
          Keine Vervielfältigung oder Weitergabe ohne ausdrückliche Genehmigung.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
